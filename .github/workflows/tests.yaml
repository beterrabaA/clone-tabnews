name: Automated Tests

on: pull_request

jobs:
  jest:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/krypton"
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests
        run: npm test
